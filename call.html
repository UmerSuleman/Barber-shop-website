<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barber Shop Website Design</title>

    <link rel="stylesheet" href="./stylesheet/contect.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <link href="https://fonts.googleapis.com/css?family=Kaushan+Script|Poppins&display=swap"
          rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/gh/cferdinandi/smooth-scroll/dist/smooth-scroll.polyfills.min.js"></script>
</head>
<body>
        <section id="banner">
<img src="./stylesheet/Barber_Shop_img/Barber_Shop_img/logo.png" class="logo"> 
<div class="banner-text">
    <h1>Contact Us</h1>
</div>
</section>  
<div id="sideNav">
    <nav>
        <ul>
            <li><a href="practice.html">Home</a></li>
            <li><a href="#feature">FEATURE</a></li>
            <li><a href="about.html">ABOUT US</a></li>
            <li><a href="#testimonial">TESTIMONIAL</a></li>
            <li><a href="call.html">MEET US</a></li>
        </ul>
    </nav>
</div>  
<div id="menuBtn">
    <img src="./stylesheet/Barber_Shop_img/Barber_Shop_img/menu.png" id="menu">
</div>
<form class="contect-form" action="#" method="post">
        <input type="text" placeholder="Your Name" required id="">
        <input type="email" placeholder="Your Email" required id="email">
        <input type="text" placeholder="Subject" required id="subject">
        <textarea rows="6" placeholder="Your Message" required id="message"></textarea>
        <button type="submit" id="button">Send Message</button>
    </form>
<section id="footer">
    <img src="./stylesheet/Barber_Shop_img/Barber_Shop_img/footer-img.png" class="footer-img">
    <div class="title-text">
        <p>CONTACT</p>
        <h1>Visit Shop Today</h1>
    </div>
    <div class="footer-row">
        <div class="footer-left">
            <h1>Opening Hours</h1>
            <p> <i class="fa fa-clock-o"></i> Monday to Friday - 9am to 9pm</p>
            <p> <i class="fa fa-clock-o"></i> Satureday to Sunday - 8am to 11pm</p>
        </div>
        <div class="footer-right">
            <h1>Getting Touch</h1>
            <p>#30 abc Colony, xyz City IN<i class="fa fa-map-marker"></i></p>
            <p>example@website.com<i class="fa fa-paper-plane"></i></p>
            <p>+01 123456789<i class="fa fa-phone"></i></p>
        </div>
    </div>
    <div class="social-links">
        <i class="fa fa-facebook"></i>
        <i class="fa fa-instagram"></i>
        <i class="fa fa-twitter"></i>
        <i class="fa fa-youtube-play"></i>
        <p>Copyright Muhammad Umer</p>
    </div>
   </section>
<script>
   var menuBtn = document.getElementById("menuBtn");
    var sideNav = document.getElementById("sideNav");
    var menu = document.getElementById("menu");
    sideNav.style.right = "-250px";
    menuBtn.onclick= function()
    {
        if(sideNav.style.right == "-250px")
        {
            sideNav.style.right = "0";
            menu.src = "./stylesheet/Barber_Shop_img/Barber_Shop_img/close.png";
        }
        else
        {
            sideNav.style.right = "-250px";
            menu.src = "./stylesheet/Barber_Shop_img/Barber_Shop_img/menu.png";
        }
    };
</script>
</body>
</html>
